name: build-and-test

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ./orders-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black pytest

      - name: Run Ruff (lint)
        working-directory: ./orders-service
        run: python -m ruff check .

      - name: Check formatting (Black)
        working-directory: ./orders-service
        run: python -m black --check .

      - name: Run tests
        working-directory: ./orders-service
        run: echo "No tests added yet"

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Add EC2 host to known_hosts
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "Testing SSH port..."
          timeout 10 bash -c "</dev/tcp/18.219.61.156/22"

          echo "Running ssh-keyscan..."
          ssh-keyscan -T 10 -H 18.219.61.156 2>ssh-keyscan.err >> ~/.ssh/known_hosts || {
            echo "ssh-keyscan failed"
            cat ssh-keyscan.err
            exit 1
          }

          chmod 644 ~/.ssh/known_hosts

      - name: Write SSH key
        env:
          EC2_KEY: ${{ secrets.EC2_KEY }}
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "$EC2_KEY" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

      - name: Deploy on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
        run: |
          set -e
          HOST="$(echo "$EC2_HOST" | tr -d '[:space:]')"
          USER="$(echo "$EC2_USER" | tr -d '[:space:]')"
          APP_DIR="$(echo "$EC2_APP_DIR" | sed 's/[[:space:]]*$//')"

          ssh -i ~/.ssh/ec2_key.pem ${USER}@${HOST} "
            set -e
            cd '${APP_DIR}'
            git fetch --all
            git reset --hard origin/main
            docker compose down
            docker compose up -d --build
            docker image prune -f
            docker compose ps
          "